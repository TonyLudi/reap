[venue]
public_ws_url = "wss://ws.okx.com:8443/ws/v5/public"

[runtime]
feed_channel_capacity = 65536
writer_channel_capacity = 65536
dedup_capacity_per_stream = 100000
max_sequence_buffer = 4096
max_subscriptions_per_socket = 100
# OKX permits three WebSocket connection requests per second per IP. This
# host-wide interval also paces reconnect storms across every Reap process.
connection_attempt_interval_ms = 400
# Every Reap process using this path shares one owner-only handshake schedule.
# Use one absolute host path in deployed capture/live/fault configurations.
connection_attempt_pacer_path = "var/reap/okx-connection-attempt.pacer"
health_interval_ms = 1000
max_book_age_ms = 5000

[output]
raw_path = "var/reap/capture/okx-btc-raw.jsonl"
flush_every_records = 1024
fsync_every_records = 10000

[host_guard]
enabled = true
check_interval_ms = 10000
min_disk_available_bytes = 5368709120
min_memory_available_bytes = 1073741824
require_clock_synchronized = true

# The Java OKX subscriber supports TBT and 400-level depth modes. Public capture
# defaults to the broadly available 400-level `books` channel; use
# `books-l2-tbt` only for an account/environment entitled to that channel.
[[subscriptions]]
channel = "books"
symbol = "BTC-USDT"
connections = 2
priority = "critical"

[[subscriptions]]
channel = "trades"
symbol = "BTC-USDT"
connections = 2
priority = "high"

[[subscriptions]]
channel = "index-tickers"
symbol = "BTC-USDT"
connections = 2
priority = "high"

[[subscriptions]]
channel = "index-tickers"
symbol = "USDT-USD"
connections = 2
priority = "critical"

[[subscriptions]]
channel = "index-tickers"
symbol = "USDC-USD"
connections = 2
priority = "critical"

[[subscriptions]]
channel = "books"
symbol = "BTC-USDT-SWAP"
connections = 2
priority = "critical"

[[subscriptions]]
channel = "trades"
symbol = "BTC-USDT-SWAP"
connections = 2
priority = "high"

[[subscriptions]]
# A production research capture must run continuously across funding boundaries;
# a clean short capture only validates connectivity and replay plumbing.
channel = "funding-rate"
symbol = "BTC-USDT-SWAP"
connections = 2
priority = "high"

[[subscriptions]]
channel = "mark-price"
symbol = "BTC-USDT-SWAP"
connections = 2
priority = "high"

[[subscriptions]]
channel = "price-limit"
symbol = "BTC-USDT-SWAP"
connections = 2
priority = "high"
