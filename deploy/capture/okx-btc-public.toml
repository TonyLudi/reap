[venue]
public_ws_url = "wss://ws.okx.com:8443/ws/v5/public"

[runtime]
feed_channel_capacity = 65536
writer_channel_capacity = 65536
dedup_capacity_per_stream = 100000
max_sequence_buffer = 4096
max_subscriptions_per_socket = 100
connection_attempt_interval_ms = 400
connection_attempt_pacer_path = "/var/lib/reap/connectivity/okx-global.pacer"
health_interval_ms = 1000
max_book_age_ms = 5000

[output]
# The systemd unit overrides this with its create-new instance path.
raw_path = "/var/lib/reap/capture/unassigned/raw.jsonl"
flush_every_records = 1024
fsync_every_records = 10000

[host_guard]
enabled = true
check_interval_ms = 10000
min_disk_available_bytes = 5368709120
min_memory_available_bytes = 1073741824
require_clock_synchronized = true

# This is the credential-free input surface required by the checked-in iarb2
# spot/swap strategy and accounting routes. Every stream is redundant.
# A clean run requires data from both configured connections and at least one
# accepted event for every subscription below.
[[subscriptions]]
channel = "books"
symbol = "BTC-USDT"
connections = 2
priority = "critical"

[[subscriptions]]
channel = "trades"
symbol = "BTC-USDT"
connections = 2
priority = "high"

[[subscriptions]]
channel = "index-tickers"
symbol = "BTC-USDT"
connections = 2
priority = "critical"

